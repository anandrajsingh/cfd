services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: exness-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exnessdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - exness-network

  redis:
    image: redis:7
    container_name: exness-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - exness-network

volumes:
  pgdata:
  redisdata:

networks:
  exness-network:
    driver: bridge
